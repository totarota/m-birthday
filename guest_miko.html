  .bg::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom,rgba(0,10,30,0.3) 0%,rgba(0,10,30,0.65) 50%,rgba(0,10,30,0.88) 100%);
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
    z-index:1; pointer-events:none;
  }

  .corner { position:fixed; width:50px; height:50px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(0,220,220,0.5); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(0,220,220,0.5); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(0,220,220,0.3); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(0,220,220,0.3); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap: 2vh;
    padding: 12px 18px;
    width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

  .name {
    font-family:'Space Mono',monospace;
    font-size:clamp(2.2rem,10vw,3rem);
    font-weight:700; color:#fff; letter-spacing:6px;
    text-shadow:0 0 20px rgba(0,220,220,0.9),0 0 50px rgba(0,180,220,0.5);
    animation:name-glow 2.5s ease-in-out infinite;
  }
  @keyframes name-glow {
    0%,100% { text-shadow:0 0 20px rgba(0,220,220,0.9),0 0 50px rgba(0,180,220,0.5); }
    50%      { text-shadow:0 0 35px rgba(0,255,255,1),  0 0 80px rgba(0,200,255,0.8); }
  }

  /* 2x2 grid */
  .photos {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap: 2vh;
    width:100%;
    max-width:360px;
  }
  .photo {
    aspect-ratio:1;
    border-radius:12px; overflow:hidden;
    border:2px solid rgba(0,220,220,0.3);
    box-shadow:0 0 16px rgba(0,180,220,0.25);
    animation:bob ease-in-out infinite;
  }
  .photo:nth-child(1){animation-duration:3.5s;animation-delay:0s;}
  .photo:nth-child(2){animation-duration:4s;  animation-delay:0.3s;}
  .photo:nth-child(3){animation-duration:3.8s;animation-delay:0.6s;}
  .photo:nth-child(4){animation-duration:4.2s;animation-delay:0.9s;}
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
  .photo img { width:100%; height:100%; object-fit:cover; display:block; }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(0,200,220,0.8),rgba(0,100,220,0.8)); border-radius:2px; }

  .weird-text {
    font-size:clamp(1rem,4.5vw,1.3rem);
    font-weight:900; color:rgba(0,220,255,0.85);
    text-align:center;
    text-shadow:0 0 15px rgba(0,200,220,0.6);
    animation:flicker 3s ease-in-out infinite;
    font-family:'Space Mono',monospace;
    letter-spacing:3px;
  }
  @keyframes flicker {
    0%,100%{opacity:1;} 45%{opacity:1;} 50%{opacity:0.3;} 55%{opacity:1;}
    85%{opacity:1;} 88%{opacity:0.4;} 91%{opacity:1;}
  }

  .back-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:11px 30px;
    background:rgba(0,180,220,0.1);
    border:1.5px solid rgba(0,200,220,0.35);
    border-radius:4px; color:rgba(0,220,255,0.9);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.4rem; letter-spacing:5px;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
    position:relative; overflow:hidden;
  }
  .back-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .back-btn:active { transform:scale(0.96); }

  /* ── GLOBAL FIT FIX ── */
  .card, .container {
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    justify-content: center !important;
  }
  img, canvas {
    max-height: 28vh !important;
    width: auto !important;
    max-width: 80vw !important;
    object-fit: contain !important;
  }
  .photos img, .photo img {
    max-height: 100% !important;
    width: 100% !important;
  }
  .cat-img, .always-img, .cake-img, .ppg-img, .hb-img, .meme-img {
    max-height: 26vh !important;
    width: auto !important;
  }
  #hb-canvas  { max-height: 26vh !important; width: auto !important; }
  #m-canvas   { max-height: 16vh !important; width: auto !important; }
  #meme-canvas{ max-height: 26vh !important; width: auto !important; }
  .gap-fix { gap: 2vh !important; }

</style>
</head>
