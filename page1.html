<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: #050a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* ── Deep background layers ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(0,60,180,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 85%,  rgba(180,0,30,0.4)  0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(0,20,80,0.6)   0%, transparent 70%);
    z-index: 0;
  }

  /* ── Scanline texture ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
    );
    z-index: 1;
    pointer-events: none;
  }

  /* ── Stars ── */
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.15; transform:scale(1); }
    50%      { opacity:1;    transform:scale(1.4); }
  }

  /* ── Corner decorations ── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    border-color: rgba(0,100,255,0.5);
    border-style: solid;
    z-index: 5;
  }
  .corner.tl { top:16px; left:16px;  border-width:3px 0 0 3px; }
  .corner.tr { top:16px; right:16px; border-width:3px 3px 0 0; border-color:rgba(200,0,40,0.5); }
  .corner.bl { bottom:16px; left:16px;  border-width:0 0 3px 3px; border-color:rgba(200,0,40,0.5); }
  .corner.br { bottom:16px; right:16px; border-width:0 3px 3px 0; }

  /* ── Floating orbs ── */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: drift ease-in-out infinite;
    z-index: 0;
  }
  @keyframes drift {
    0%,100% { transform: translate(0,0); }
    33%      { transform: translate(20px,-30px); }
    66%      { transform: translate(-15px,20px); }
  }

  /* ── Main container ── */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 24px 16px;
    animation: appear 1.1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear {
    from { opacity:0; transform:translateY(40px) scale(.95); }
    to   { opacity:1; transform:translateY(0)   scale(1); }
  }

  /* ── HB image ── */
  #hb-canvas {
    max-width: 88vw;
    width: 340px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(0,120,255,0.5))
            drop-shadow(0 0 40px rgba(200,0,40,0.3));
  }
  @keyframes float {
    0%,100% { transform: translateY(0)   rotate(-1deg); }
    50%      { transform: translateY(-10px) rotate(1deg); }
  }

  /* ── Divider line ── */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, rgba(0,100,255,0.8), rgba(200,0,40,0.8));
    border-radius: 2px;
    animation: expand 1.5s ease forwards;
    animation-delay: 0.6s;
    transform-origin: center;
    transform: scaleX(0);
  }
  @keyframes expand { to { transform:scaleX(1); } }

  /* ── M canvas ── */
  #m-canvas {
    width: 100px; height: 100px;
    border-radius: 50%;
    box-shadow:
      0 0 0 2px rgba(0,100,255,0.4),
      0 0 0 5px rgba(200,0,40,0.2),
      0 0 30px rgba(0,80,200,0.5);
    animation: pulse 2.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(0,100,255,0.4), 0 0 0 5px rgba(200,0,40,0.2), 0 0 30px rgba(0,80,200,0.5); }
    50%      { box-shadow: 0 0 0 3px rgba(0,140,255,0.7), 0 0 0 8px rgba(220,0,50,0.35), 0 0 50px rgba(0,100,255,0.7); }
  }

  /* ── Ticker text ── */
  .ticker-wrap {
    width: 88vw;
    overflow: hidden;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 6px 0;
  }
  .ticker {
    display: inline-block;
    white-space: nowrap;
    animation: scroll-left 12s linear infinite;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
  }
  @keyframes scroll-left {
    from { transform: translateX(88vw); }
    to   { transform: translateX(-100%); }
  }

  /* ── NEXT button ── */
  .next-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 42px;
    background: linear-gradient(135deg, rgba(0,60,180,0.25), rgba(180,0,30,0.25));
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 6px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.3s;
  }
  .next-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,100,255,0.35), rgba(220,0,40,0.35));
    opacity: 0;
    transition: opacity 0.35s;
  }
  .next-btn:active::before { opacity: 1; }
  .next-btn:active {
    border-color: rgba(0,140,255,0.8);
    transform: scale(0.97);
  }
  /* shimmer sweep */
  .next-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -75%; }
    100% { left: 175%; }
  }
  .arrow { display:inline-block; animation: arrow-bounce 1.5s ease-in-out infinite; }
  @keyframes arrow-bounce {
    0%,100% { transform:translateX(0); }
    50%      { transform:translateX(5px); }
  }
</style>
</head>
<body>

<div class="orb" style="width:180px;height:180px;background:rgba(180,0,30,0.25);bottom:-40px;right:-40px;animation-duration:10s;animation-delay:2s;"></div>
<div class="orb" style="width:120px;height:120px;background:rgba(0,40,160,0.2);bottom:30%;left:10%;animation-duration:12s;animation-delay:4s;"></div>

<script>
// Stars
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');

  const sz = Math.random()*2+1;

// Remove white bg from HB
function removeWhite(img, canvas, thr) {
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0,0,canvas.width,canvas.height);
  for (let i=0;i<d.data.length;i+=4) {
    if (d.data[i]>thr && d.data[i+1]>thr && d.data[i+2]>thr) d.data[i+3]=0;
  }
  ctx.putImageData(d,0,0);
}

// Remove black bg from M

  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0,0,canvas.width,canvas.height);
  for (let i=0;i<d.data.length;i+=4) {
    if (d.data[i]<thr && d.data[i+1]<thr && d.data[i+2]<thr) d.data[i+3]=0;
  }
  ctx.putImageData(d,0,0);
}

window.addEventListener('load', () => {
  removeWhite(document.getElementById('hb-src'), document.getElementById('hb-canvas'), 220);
  removeBlack(document.getElementById('m-src'),  document.getElementById('m-canvas'),  45);
});
</script>
