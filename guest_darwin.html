<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>داروين</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&family=Space+Mono:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#080010;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(100,0,0,0.6) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 80%, rgba(60,0,80,0.5) 0%,transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(30,0,40,0.7) 0%,transparent 70%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);
    z-index:1; pointer-events:none;
  }

  /* blood drip from top */
  .drip {
    position:fixed; top:0; width:6px;
    background:linear-gradient(to bottom, #8b0000, #cc0000, transparent);
    border-radius:0 0 4px 4px;
    animation:drip-down ease-in infinite;
    z-index:3;
  }
  @keyframes drip-down {
    0%   { height:0; opacity:1; }
    70%  { height:60px; opacity:1; }
    100% { height:80px; opacity:0; }
  }

  .corner { position:fixed; width:50px; height:50px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(180,0,0,0.7); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(180,0,0,0.7); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(180,0,0,0.5); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(180,0,0,0.5); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap: 2vh;
    padding: 10px 18px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

  /* RIP cross */
  .rip-wrap {
    display:flex; flex-direction:column; align-items:center; gap: 2vh;
    animation:float-grave 4s ease-in-out infinite;
  }
  @keyframes float-grave { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  .cross {
    position:relative; width:60px; height:80px;
  }
  .cross::before {
    content:''; position:absolute;
    width:12px; height:80px; background:#555; border-radius:4px;
    left:50%; transform:translateX(-50%);
    box-shadow:0 0 12px rgba(180,0,0,0.4);
  }
  .cross::after {
    content:''; position:absolute;
    width:50px; height:12px; background:#555; border-radius:4px;
    top:18px; left:50%; transform:translateX(-50%);
    box-shadow:0 0 12px rgba(180,0,0,0.4);
  }

  .rip-text {
    font-family:'Space Mono',monospace;
    font-size:1.4rem; font-weight:700;
    color:rgba(200,50,50,0.9); letter-spacing:4px;
    text-shadow:0 0 15px rgba(180,0,0,0.8);
    animation:rip-glow 2s ease-in-out infinite;
  }
  @keyframes rip-glow {
    0%,100%{text-shadow:0 0 15px rgba(180,0,0,0.8);}
    50%     {text-shadow:0 0 30px rgba(220,0,0,1), 0 0 60px rgba(180,0,0,0.5);}
  }

  .name {
    font-family:'Space Mono',monospace;
    font-size:clamp(1.8rem,8vw,2.5rem);
    font-weight:700; color:#888; letter-spacing:5px;
    text-decoration:line-through;
    text-shadow:0 0 10px rgba(100,0,0,0.6);
  }

  /* on the way text */
  .onway {
    font-size:clamp(1rem,4.5vw,1.2rem);
    font-weight:900; color:rgba(255,200,100,0.85);
    text-align:center; direction:rtl;
    text-shadow:0 0 12px rgba(255,150,0,0.5);
  }

  /* confession box */
  .confession {
    background:rgba(80,0,0,0.25);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1.5px solid rgba(180,0,0,0.4);
    border-radius:14px;
    padding:16px 18px;
    width:100%; max-width:360px;
    box-shadow:0 0 24px rgba(180,0,0,0.2);
  }
  .confession-text {
    font-size:clamp(0.9rem,4vw,1.05rem);
    font-weight:700; color:rgba(255,180,180,0.9);
    text-align:center; line-height:1.8; direction:rtl;
  }
  .confession-text .red { color:#ff4444; font-weight:900; }

  /* احمدي ربك */
  .thankgod {
    font-size:clamp(0.85rem,3.8vw,1rem);
    font-weight:700; color:rgba(255,255,255,0.45);
    text-align:center; direction:rtl;
    letter-spacing:1px;
  }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(180,0,0,0.8),rgba(100,0,50,0.8)); border-radius:2px; }

  .back-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:10px 28px;
    background:rgba(100,0,0,0.2);
    border:1.5px solid rgba(180,0,0,0.4);
    border-radius:4px; color:rgba(255,120,120,0.8);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.3rem; letter-spacing:4px;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .back-btn:active { transform:scale(0.96); }

  /* ── GLOBAL FIT FIX ── */
  .card, .container {
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    justify-content: center !important;
  }
  img, canvas {
    max-height: 28vh !important;
    width: auto !important;
    max-width: 80vw !important;
    object-fit: contain !important;
  }
  .photos img, .photo img {
    max-height: 100% !important;
    width: 100% !important;
  }
  .cat-img, .always-img, .cake-img, .ppg-img, .hb-img, .meme-img {
    max-height: 26vh !important;
    width: auto !important;
  }
  #hb-canvas  { max-height: 26vh !important; width: auto !important; }
  #m-canvas   { max-height: 16vh !important; width: auto !important; }
  #meme-canvas{ max-height: 26vh !important; width: auto !important; }
  .gap-fix { gap: 2vh !important; }

</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="card">

  <div class="rip-wrap">
    <div class="cross"></div>
    <div class="rip-text">R.I.P</div>
  </div>

  <div class="name">داروين</div>

  <div class="onway">خلينا نقول إن داروين في الطرييييق... 🚶</div>

  <div class="confession">
    <div class="confession-text">
      أنا <span class="red">قتلت داروين</span><br>
      لأنو <span class="red">مش بنت</span><br>
      ممنوع أي رجل غيري 😾
    </div>
  </div>

  <div class="thankgod">احمدي ربك سمحت بزوار 😾</div>

  <div class="divider"></div>

  <a class="back-btn" href="page6.html">← BACK</a>
</div>

<script>
// blood drips
for(let i=0;i<10;i++){
  const d=document.createElement('div');
  d.className='drip';
  const w=Math.random()*6+4;
  d.style.cssText=[
    'width:'+w+'px',
    'left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*2+1.5)+'s',
    'animation-delay:'+(Math.random()*3)+'s'
  ].join(';');
  document.body.appendChild(d);
}
</script>
</body>
</html>
