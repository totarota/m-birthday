<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>أيوه 💙</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#020d1a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif;
    direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 70% at 50% 0%,  rgba(0,80,200,0.5) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 10% 90%, rgba(180,0,30,0.4) 0%,transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 40%, rgba(0,40,120,0.4) 0%,transparent 60%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);
    z-index:1; pointer-events:none;
  }

  .heart-float { position:fixed; animation:heart-rise linear infinite; z-index:2; opacity:0; }
  @keyframes heart-rise {
    0%   { transform:translateY(110vh) scale(0.5); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.6; }
    100% { transform:translateY(-10vh) scale(1.1) rotate(15deg); opacity:0; }
  }

  .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:2; }
  @keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(1);} 50%{opacity:1;transform:scale(1.5);} }

  .corner { position:fixed; width:55px; height:55px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(0,120,255,0.6); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(200,0,40,0.6); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(200,0,40,0.6); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(0,120,255,0.6); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 2vh; padding:0 24px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(30px) scale(.96);} to{opacity:1;transform:translateY(0) scale(1);} }

  .hehe {
    font-size:clamp(1.8rem,8vw,2.5rem);
    font-weight:900; color:#fff;
    text-align:center; line-height:1.3;
    text-shadow:0 0 20px rgba(0,140,255,0.9),0 0 50px rgba(200,0,40,0.5);
    animation:glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { text-shadow:0 0 20px rgba(0,140,255,0.9),0 0 50px rgba(200,0,40,0.5); }
    50%      { text-shadow:0 0 35px rgba(0,180,255,1),  0 0 70px rgba(220,0,50,0.8); }
  }

  .media-row {
    display:flex; align-items:center; justify-content:center; gap: 2vh;
  }

  /* ── SVG Heart ── */
  .heart-wrap {
    width: min(35vw,130px);
    height: min(35vw,130px);
    display:flex; align-items:center; justify-content:center;
    animation:heart-beat 1.1s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(220,0,40,0.8)) drop-shadow(0 0 28px rgba(220,0,80,0.5));
  }
  @keyframes heart-beat {
    0%,100% { transform:scale(1); filter:drop-shadow(0 0 12px rgba(220,0,40,0.8)) drop-shadow(0 0 28px rgba(220,0,80,0.5)); }
    30%      { transform:scale(1.18); filter:drop-shadow(0 0 22px rgba(255,30,60,1)) drop-shadow(0 0 45px rgba(255,0,60,0.8)); }
    60%      { transform:scale(1.08); }
  }
  .heart-wrap svg {
    width:100%; height:100%;
  }

  /* ── PPG image — rounded rect ── */
  .ppg-wrap {
    position:relative;
    animation:bob 3.5s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
  .ppg-wrap::before {
    content:'';
    position:absolute; inset:-8px;
    border-radius:18px;
    background:conic-gradient(rgba(0,100,255,0.5),rgba(220,0,40,0.5),rgba(0,200,255,0.3),rgba(0,100,255,0.5));
    filter:blur(10px);
    animation:spin 6s linear infinite;
    z-index:-1;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
  .ppg-img {
    width: min(35vw,130px);
    height: min(35vw,130px);
    border-radius:16px;
    object-fit:cover;
    border:2.5px solid rgba(0,140,255,0.5);
    display:block;
  }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(0,100,255,0.8),rgba(200,0,40,0.8)); border-radius:2px; }

  .next-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:14px 38px;
    background:linear-gradient(135deg,rgba(0,60,180,0.3),rgba(180,0,30,0.3));
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:4px; color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.6rem; letter-spacing:5px;
    text-decoration:none; cursor:pointer;
    position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .next-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .next-btn:active { transform:scale(0.97); }
  .arrow { display:inline-block; animation:arrow-b 1.5s ease-in-out infinite; }
  @keyframes arrow-b { 0%,100%{transform:translateX(0);} 50%{transform:translateX(5px);} }

  
  

  /* == SCROLL FIX == */
  html { height: 100%; }
  body {
    min-height: 100vh !important;
    height: auto !important;
    overflow-y: scroll !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
  }
  .card, .container {
    height: auto !important;
    max-height: none !important;
    overflow: visible !important;
    padding-bottom: 40px !important;
  }
  .next-btn, .back-btn, .nav-btn, .boom-btn {
    margin-bottom: 20px !important;
    flex-shrink: 0 !important;
  }
  /* == END SCROLL FIX == */
</style>
</head>

<script>
// floating hearts (SVG this time)
function makeSVGHeart() {
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 100 90');
  svg.style.cssText='width:28px;height:28px;';
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d','M50 82 C50 82 8 54 8 28 C8 14 19 4 32 4 C39 4 46 8 50 14 C54 8 61 4 68 4 C81 4 92 14 92 28 C92 54 50 82 50 82Z');
  const colors=['#ff4466','#0099ff','#ff2244','#4488ff'];
  path.setAttribute('fill',colors[Math.floor(Math.random()*colors.length)]);
  svg.appendChild(path);
  return svg;
}

for(let i=0;i<18;i++){
  const wrap=document.createElement('div');
  wrap.className='heart-float';
  wrap.appendChild(makeSVGHeart());
  wrap.style.cssText=[
    'left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*6+5)+'s',
    'animation-delay:'+(Math.random()*6)+'s',
  ].join(';');
  document.body.appendChild(wrap);
}

// stars
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=['width:'+sz+'px','height:'+sz+'px',
    'top:'+(Math.random()*100)+'vh','left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*3+2)+'s',
    'animation-delay:'+(Math.random()*4)+'s'].join(';');
  document.body.appendChild(s);
}
</script>
