<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kitty</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&family=Space+Mono:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#0a0010;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(180,0,80,0.4) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 80%, rgba(120,0,180,0.4) 0%,transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(60,0,120,0.5) 0%,transparent 70%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
    z-index:1; pointer-events:none;
  }

  .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:2; }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.9;} }

  .corner { position:fixed; width:50px; height:50px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(255,80,160,0.6); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(255,80,160,0.6); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(180,0,255,0.5); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(180,0,255,0.5); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap: 2vh;
    padding: 12px 18px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

  .title {
    font-family:'Space Mono',monospace;
    font-size:clamp(2rem,9vw,2.8rem);
    font-weight:700; color:#fff; letter-spacing:5px;
    text-shadow:0 0 20px rgba(255,80,160,0.9),0 0 50px rgba(180,0,255,0.5);
    animation:name-glow 2.5s ease-in-out infinite;
  }
  @keyframes name-glow {
    0%,100% { text-shadow:0 0 20px rgba(255,80,160,0.9),0 0 50px rgba(180,0,255,0.5); }
    50%      { text-shadow:0 0 35px rgba(255,120,200,1), 0 0 80px rgba(200,0,255,0.8); }
  }

  .subtitle {
    font-size:clamp(0.9rem,4vw,1.1rem);
    font-weight:900; color:rgba(255,150,200,0.85);
    text-align:center; direction:rtl;
    text-shadow:0 0 12px rgba(255,80,160,0.5);
    animation:shake 2s ease-in-out infinite;
  }
  @keyframes shake { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-2deg);} 75%{transform:rotate(2deg);} }

  .photos {
    display:grid; grid-template-columns:1fr 1fr;
    gap: 2vh; width:100%; max-width:360px;
  }

  .photo {
    aspect-ratio:1; border-radius:12px; overflow:hidden;
    border:2px solid rgba(255,80,160,0.3);
    box-shadow:0 0 16px rgba(255,80,160,0.2);
    position:relative;
    animation:bob ease-in-out infinite;
  }
  .photo:nth-child(1){animation-duration:3.5s;animation-delay:0s;}
  .photo:nth-child(2){animation-duration:4s;  animation-delay:0.3s;}
  .photo:nth-child(3){animation-duration:3.8s;animation-delay:0.6s;}
  .photo:nth-child(4){animation-duration:4.2s;animation-delay:0.9s;}
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }

  .photo img { width:100%; height:100%; object-fit:cover; display:block; transition:filter 0.3s; }

  /* canvas explosion sits on top of each photo */
  .photo canvas {
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    border-radius:10px;
  }

  .boom-label {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.8rem; color:#ffdd00;
    text-shadow:0 0 10px #ff4400,0 0 20px #ff8800;
    z-index:20; pointer-events:none; white-space:nowrap;
    transition:transform 0.3s cubic-bezier(.17,.67,.38,1.5);
  }
  .photo.exploded .boom-label { transform:translate(-50%,-50%) scale(1); }
  .photo.exploded img { filter:brightness(0.25) saturate(4); }
  .photo.exploded { animation:none !important; }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(255,80,160,0.8),rgba(180,0,255,0.8)); border-radius:2px; }

  .boom-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:14px 36px;
    background:linear-gradient(135deg,rgba(200,0,60,0.4),rgba(120,0,200,0.4));
    border:2px solid rgba(255,80,160,0.5);
    border-radius:6px; color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.6rem; letter-spacing:5px;
    cursor:pointer; position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 0 20px rgba(255,80,160,0.3);
    animation:btn-pulse 2s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%,100%{box-shadow:0 0 20px rgba(255,80,160,0.3);}
    50%     {box-shadow:0 0 35px rgba(255,80,160,0.7);}
  }
  .boom-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
    animation:shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .boom-btn:active { transform:scale(0.94); }

  .back-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:10px 28px;
    background:rgba(255,80,160,0.08);
    border:1.5px solid rgba(255,80,160,0.3);
    border-radius:4px; color:rgba(255,160,200,0.8);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.3rem; letter-spacing:4px;
    text-decoration:none; -webkit-tap-highlight-color:transparent;
  }
  .back-btn:active { transform:scale(0.96); }

  
  

  /* == SCROLL FIX == */
  html { height: 100%; }
  body {
    min-height: 100vh !important;
    height: auto !important;
    overflow-y: scroll !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
  }
  .card, .container {
    height: auto !important;
    max-height: none !important;
    overflow: visible !important;
    padding-bottom: 40px !important;
  }
  .next-btn, .back-btn, .nav-btn, .boom-btn {
    margin-bottom: 20px !important;
    flex-shrink: 0 !important;
  }
  /* == END SCROLL FIX == */
</style>
</head>

<script>
// Draw canvas explosion (particles) — unique per photo
function drawExplosion(canvasId, photoId) {
  const photo = document.getElementById(photoId);
  const cvs   = document.getElementById(canvasId);
  const w = photo.offsetWidth  || 150;
  const h = photo.offsetHeight || 150;
  cvs.width  = w;
  cvs.height = h;
  const ctx = cvs.getContext('2d');

  const colors = ['#ff4400','#ff8800','#ffdd00','#ff2200','#ffaa00','#ffffff','#ff6600'];
  const particles = [];
  const cx = w/2, cy = h/2;

  for(let i=0;i<80;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*6+2;
    particles.push({
      x:cx, y:cy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      r:  Math.random()*8+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      alpha:1,
      decay: Math.random()*0.025+0.015,
      shape: Math.random()>0.5 ? 'circle' : 'rect'
    });
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0,0,w,h);
    // radial flash
    if(frame < 6) {
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,w*0.6);
      g.addColorStop(0, `rgba(255,200,50,${0.8-(frame*0.13)})` );
      g.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
    }
    let alive = false;
    particles.forEach(p => {
      if(p.alpha <= 0) return;
      alive = true;
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.18; // gravity
      p.alpha -= p.decay;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      if(p.shape === 'circle') {
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillRect(p.x-p.r/2, p.y-p.r/2, p.r, p.r*1.4);
      }
    });
    ctx.globalAlpha = 1;
    frame++;
    if(alive) requestAnimationFrame(animate);
  }
  animate();
}

function explodeAll() {
  [['c0','p0'],['c1','p1'],['c2','p2'],['c3','p3']].forEach(([c,p], i) => {
    setTimeout(() => {
      document.getElementById(p).classList.add('exploded');
      drawExplosion(c, p);
      // screen shake
      document.body.style.transition='transform 0.05s';
      document.body.style.transform=`translate(${(Math.random()*12-6).toFixed(1)}px,${(Math.random()*12-6).toFixed(1)}px)`;
      setTimeout(()=>{document.body.style.transform='translate(0,0)';},120);
    }, i*200);
  });
}

// stars
for(let i=0;i<40;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=['width:'+sz+'px','height:'+sz+'px',
    'top:'+(Math.random()*100)+'vh','left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*3+2)+'s',
    'animation-delay:'+(Math.random()*4)+'s'].join(';');
  document.body.appendChild(s);
}
</script>
