<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سؤال</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    height:100vh;
    background:#e8eef8;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }

  /* soft light bg */
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(180,210,255,0.6) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 80%, rgba(200,180,255,0.4) 0%,transparent 60%),
      radial-gradient(ellipse 60% 60% at 50% 50%, rgba(220,230,255,0.5) 0%,transparent 70%);
    z-index:0;
  }

  /* soft dots */
  .dot {
    position:fixed; border-radius:50%;
    background:rgba(100,140,255,0.12);
    animation:drift ease-in-out infinite; z-index:0;
  }
  @keyframes drift { 0%,100%{transform:translate(0,0);} 50%{transform:translate(15px,-20px);} }

  .corner { position:fixed; width:45px; height:45px; border-style:solid; z-index:5; }
  .corner.tl { top:10px; left:10px;  border-width:2px 0 0 2px; border-color:rgba(80,120,220,0.4); }
  .corner.tr { top:10px; right:10px; border-width:2px 2px 0 0; border-color:rgba(80,120,220,0.4); }
  .corner.bl { bottom:10px; left:10px;  border-width:0 0 2px 2px; border-color:rgba(140,80,220,0.3); }
  .corner.br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-color:rgba(140,80,220,0.3); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:3vh;
    padding:16px 22px; width:100%; height:100vh;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

  .top-text {
    font-size:clamp(1.2rem,5.5vw,1.7rem);
    font-weight:900; color:#2a3a7a; text-align:center;
    text-shadow:0 2px 12px rgba(80,120,255,0.2);
    animation:glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100%{color:#2a3a7a;}
    50%     {color:#3a50cc;}
  }

  .meme-img {
    width:min(58vw,210px);
    height:min(58vw,210px);
    object-fit:contain;
    display:block;
    animation:float 3.5s ease-in-out infinite;
    filter:drop-shadow(0 4px 16px rgba(80,100,200,0.2));
  }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-10px) rotate(1deg);} }

  .bottom-text {
    font-size:clamp(1.1rem,5vw,1.4rem);
    font-weight:900; color:#2a3a7a; text-align:center;
    text-shadow:0 2px 8px rgba(80,100,200,0.15);
    animation:pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

  .divider { width:60px; height:2px; background:linear-gradient(90deg,rgba(80,120,255,0.5),rgba(160,80,255,0.5)); border-radius:2px; }

  .next-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:12px 36px;
    background:linear-gradient(135deg,rgba(80,120,255,0.15),rgba(160,80,255,0.15));
    border:1.5px solid rgba(80,120,255,0.35);
    border-radius:4px; color:#2a3a7a;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.5rem; letter-spacing:5px;
    text-decoration:none; position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.3s;
  }
  .next-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .next-btn:active { transform:scale(0.97); background:rgba(80,120,255,0.2); }
  .arrow { animation:arrow-b 1.5s ease-in-out infinite; display:inline-block; }
  @keyframes arrow-b { 0%,100%{transform:translateX(0);} 50%{transform:translateX(5px);} }
</style>
</head>

<div class="corner bl"></div>
