<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>لحظة الحقيقة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    min-height: 100vh;
    background: #050a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0,60,180,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 85%, rgba(180,0,30,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,20,80,0.6) 0%, transparent 70%);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      180deg, transparent 0px, transparent 3px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
    );
    z-index: 1; pointer-events: none;
  }

  .star {
    position: fixed; background: white; border-radius: 50%;
    animation: twinkle ease-in-out infinite; z-index: 2;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.15; transform:scale(1); }
    50%      { opacity:1;    transform:scale(1.4); }
  }

  .corner { position:fixed; width:60px; height:60px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(0,100,255,0.5); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(200,0,40,0.5); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(200,0,40,0.5); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(0,100,255,0.5); }

  .orb { position:fixed; border-radius:50%; filter:blur(60px); animation:drift ease-in-out infinite; z-index:0; }
  @keyframes drift { 0%,100%{transform:translate(0,0);} 33%{transform:translate(20px,-30px);} 66%{transform:translate(-15px,20px);} }

  /* ── Centre card ── */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    padding: 0 24px;
    width: 100%;
    animation: appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear {
    from { opacity:0; transform:translateY(30px) scale(.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .label {
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    font-family: 'Bebas Neue', sans-serif;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 5px 18px;
    border-radius: 2px;
  }

  .subtitle {
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    color: rgba(255,255,255,0.45);
    font-weight: 400;
    text-align: center;
  }

  .question {
    font-size: clamp(2.2rem, 10vw, 3rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    text-align: center;
    text-shadow:
      0 0 20px rgba(0,120,255,0.8),
      0 0 50px rgba(200,0,40,0.5);
    animation: q-pulse 2.5s ease-in-out infinite;
  }
  @keyframes q-pulse {
    0%,100% { text-shadow: 0 0 20px rgba(0,120,255,0.8), 0 0 50px rgba(200,0,40,0.5); }
    50%      { text-shadow: 0 0 35px rgba(0,160,255,1),   0 0 70px rgba(220,0,50,0.8); }
  }

  .divider {
    width: 70px; height: 2px;
    background: linear-gradient(90deg, rgba(0,100,255,0.8), rgba(200,0,40,0.8));
    border-radius: 2px;
  }

  .btns { display:flex; gap: 2vh; align-items:center; justify-content:center; width:100%; }

  .choice-btn {
    flex: 1;
    max-width: 140px;
    padding: 16px 10px;
    border-radius: 8px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    cursor: pointer;
    border: 2px solid transparent;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.2s;
    text-decoration: none;
    display: inline-flex; align-items:center; justify-content:center; gap: 2vh;
  }
  .choice-btn:active { transform: scale(0.93); }

  .btn-yes {
    background: linear-gradient(135deg, rgba(0,80,220,0.4), rgba(0,40,140,0.4));
    border-color: rgba(0,140,255,0.7);
    color: #7df;
    box-shadow: 0 0 20px rgba(0,100,255,0.35);
  }
  .btn-no {
    background: linear-gradient(135deg, rgba(180,0,30,0.4), rgba(100,0,20,0.4));
    border-color: rgba(220,0,40,0.7);
    color: #f88;
    box-shadow: 0 0 20px rgba(200,0,40,0.35);
  }

  .choice-btn::after {
    content:'';
    position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }

  .back-btn {
    display:inline-flex; align-items:center; gap: 2vh;
    padding:10px 28px;
    background:transparent;
    border:1.5px solid rgba(255,255,255,0.15);
    border-radius:4px; color:rgba(255,255,255,0.35);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.2rem; letter-spacing:4px;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .back-btn:active { color:#fff; border-color:rgba(255,255,255,0.5); }

  /* ── GLOBAL FIT FIX ── */
  .card, .container {
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    justify-content: center !important;
  }
  img, canvas {
    max-height: 28vh !important;
    width: auto !important;
    max-width: 80vw !important;
    object-fit: contain !important;
  }
  .photos img, .photo img {
    max-height: 100% !important;
    width: 100% !important;
  }
  .cat-img, .always-img, .cake-img, .ppg-img, .hb-img, .meme-img {
    max-height: 26vh !important;
    width: auto !important;
  }
  #hb-canvas  { max-height: 26vh !important; width: auto !important; }
  #m-canvas   { max-height: 16vh !important; width: auto !important; }
  #meme-canvas{ max-height: 26vh !important; width: auto !important; }
  .gap-fix { gap: 2vh !important; }

</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="orb" style="width:200px;height:200px;background:rgba(0,60,200,0.28);top:-50px;left:-50px;animation-duration:8s;"></div>
<div class="orb" style="width:160px;height:160px;background:rgba(180,0,30,0.22);bottom:-30px;right:-30px;animation-duration:10s;animation-delay:2s;"></div>

<div class="card">
  <div class="label">⚡ لحظة الحقيقة ⚡</div>
  <div class="subtitle">السؤال اللي لازم يتجاوب</div>
  <div class="question">بتحبيني؟؟!!</div>
  <div class="divider"></div>
  <div class="btns">
    <a class="choice-btn btn-yes" href="page_yes.html">أيوه 💙</a>
    <a class="choice-btn btn-no"  href="page_no.html">لأ 🚫</a>
  </div>
  <a class="back-btn" href="page2.html">← BACK</a>
</div>

<script>
for(let i=0;i<55;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=['width:'+sz+'px','height:'+sz+'px',
    'top:'+(Math.random()*100)+'vh','left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*3+2)+'s',
    'animation-delay:'+(Math.random()*4)+'s'].join(';');
  document.body.appendChild(s);
}
</script>
</body>
</html>
