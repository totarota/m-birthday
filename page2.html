<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday - Cake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: #050a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    font-family: 'Bebas Neue', sans-serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(0,60,180,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 85%,  rgba(180,0,30,0.4)  0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(0,20,80,0.6)   0%, transparent 70%);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      180deg, transparent 0px, transparent 3px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
    );
    z-index: 1; pointer-events: none;
  }

  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle ease-in-out infinite; z-index: 2;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.15; transform:scale(1); }
    50%      { opacity:1;    transform:scale(1.4); }
  }

  .corner {
    position: fixed; width:70px; height:70px;
    border-color: rgba(0,100,255,0.5); border-style: solid; z-index: 5;
  }
  .corner.tl { top:16px; left:16px;  border-width:3px 0 0 3px; }
  .corner.tr { top:16px; right:16px; border-width:3px 3px 0 0; border-color:rgba(200,0,40,0.5); }
  .corner.bl { bottom:16px; left:16px;  border-width:0 0 3px 3px; border-color:rgba(200,0,40,0.5); }
  .corner.br { bottom:16px; right:16px; border-width:0 3px 3px 0; }

  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(60px); animation: drift ease-in-out infinite; z-index: 0;
  }
  @keyframes drift {
    0%,100% { transform:translate(0,0); }
    33%      { transform:translate(20px,-30px); }
    66%      { transform:translate(-15px,20px); }
  }

  /* ── Main container ── */
  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 2vh;
    padding: 12px 18px;
    animation: appear 1.1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear {
    from { opacity:0; transform:translateY(40px) scale(.95); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* ── Text ── */
  .headline {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(1.3rem, 6vw, 1.7rem);
    color: #fff;
    text-align: center;
    line-height: 1.4;
    text-shadow:
      0 0 20px rgba(0,120,255,0.7),
      0 0 40px rgba(200,0,40,0.5);
    animation: text-glow 2.5s ease-in-out infinite;
    direction: rtl;
  }
  @keyframes text-glow {
    0%,100% { text-shadow: 0 0 20px rgba(0,120,255,0.7), 0 0 40px rgba(200,0,40,0.5); }
    50%      { text-shadow: 0 0 30px rgba(0,160,255,1),   0 0 60px rgba(220,0,50,0.7); }
  }

  /* ── Cake image ── */
  .cake-wrap {
    position: relative;
  }
  .cake-wrap::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: conic-gradient(
      rgba(0,100,255,0.4), rgba(220,0,40,0.4),
      rgba(255,200,0,0.3), rgba(0,200,100,0.3),
      rgba(0,100,255,0.4)
    );
    filter: blur(16px);
    animation: spin-glow 6s linear infinite;
    z-index: -1;
  }
  @keyframes spin-glow { to { transform: rotate(360deg); } }

  .cake-img {
    width: min(72vw, 280px);
    height: min(72vw, 280px);
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 3px solid rgba(255,255,255,0.1);
    animation: cake-float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(0,100,255,0.4));
  }
  @keyframes cake-float {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-10px) scale(1.02); }
  }

  /* spinning ring around cake */
  .cake-ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.15);
    animation: spin-ring 12s linear infinite;
  }
  .cake-ring::after {
    content: '🎂';
    position: absolute; top: -12px; left: 50%;
    transform: translateX(-50%);
    font-size: 1.1rem;
  }
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, rgba(0,100,255,0.8), rgba(200,0,40,0.8));
    border-radius: 2px;
  }

  /* ── Ticker ── */
  .ticker-wrap {
    width: 88vw; overflow: hidden;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 6px 0;
  }
  .ticker {
    display: inline-block; white-space: nowrap;
    animation: scroll-left 12s linear infinite;
    font-size: 0.8rem; letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
  }
  @keyframes scroll-left {
    from { transform: translateX(88vw); }
    to   { transform: translateX(-100%); }
  }

  /* ── Buttons row ── */
  .btn-row {
    display: flex; gap: 2vh; align-items: center;
  }

  .nav-btn {
    display: inline-flex; align-items: center; gap: 2vh;
    padding: 12px 32px;
    background: linear-gradient(135deg, rgba(0,60,180,0.25), rgba(180,0,30,0.25));
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 4px; color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 5px;
    text-decoration: none; cursor: pointer;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.3s;
  }
  .nav-btn::after {
    content: '';
    position: absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0% { left:-75%; } 100% { left:175%; } }
  .nav-btn:active { transform: scale(0.97); border-color: rgba(0,140,255,0.8); }

  .arrow { display:inline-block; animation: arrow-b 1.5s ease-in-out infinite; }
  @keyframes arrow-b {
    0%,100% { transform:translateX(0); }
    50%      { transform:translateX(5px); }
  }
  .arrow-back { display:inline-block; animation: arrow-back-a 1.5s ease-in-out infinite; }
  @keyframes arrow-back-a {
    0%,100% { transform:translateX(0); }
    50%      { transform:translateX(-5px); }
  }

  
  /* ══ FIXED LAYOUT ══ */
  html, body {
    height: 100% !important;
    overflow: hidden !important;
  }
  .card, .container {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: space-between !important;
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    padding: 12px 18px 16px !important;
    gap: 0 !important;
    box-sizing: border-box !important;
  }
  /* shrink images to always fit */
  img:not(.bg *), canvas {
    flex-shrink: 1 !important;
    min-height: 0 !important;
    max-height: 30vh !important;
    width: auto !important;
    max-width: 82vw !important;
    object-fit: contain !important;
    display: block !important;
  }
  /* photo grids */
  .photos, .imgs, .media-row, .btn-row {
    flex-shrink: 1 !important;
    min-height: 0 !important;
  }
  .photos img, .photo img, .imgs img {
    max-height: 100% !important;
    width: 100% !important;
    object-fit: cover !important;
  }
  /* text shrink */
  .question, .hehe, .title, .name, .no-word {
    font-size: clamp(1.4rem, 7vw, 2.2rem) !important;
  }
  .subtitle, .sub-text, .msg-text, .bottom-text, .out-text, .important, .confession-text {
    font-size: clamp(0.78rem, 3.5vw, 1rem) !important;
    line-height: 1.5 !important;
  }
  /* nav buttons always at bottom */
  .next-btn, .back-btn, .nav-btn, .boom-btn, .choice-btn {
    flex-shrink: 0 !important;
    padding: 10px 28px !important;
    font-size: 1.3rem !important;
  }
  .btns, .btn-row, .bottom-row {
    flex-shrink: 0 !important;
    margin-top: auto !important;
  }
  .divider { margin: 4px 0 !important; }
  .msg-box, .confession, .bottom-msg { padding: 10px 14px !important; }
  /* ══ END FIXED ══ */
</style>
</head>
