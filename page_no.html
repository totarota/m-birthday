<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>لأ؟!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; }
  body {
    min-height:100vh;
    background:#07010f;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif;
    direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 0%,  rgba(80,0,120,0.5) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 10% 80%, rgba(150,0,20,0.45) 0%,transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 30%, rgba(30,0,80,0.4) 0%,transparent 60%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 4px);
    z-index:1; pointer-events:none;
  }
  .rain { position:fixed; width:1px; background:linear-gradient(transparent,rgba(150,100,255,0.4)); animation:fall linear infinite; z-index:2; }
  @keyframes fall { from{transform:translateY(-100px);opacity:1;} to{transform:translateY(110vh);opacity:0.2;} }
  .corner { position:fixed; width:55px; height:55px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(120,0,180,0.6); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(180,0,30,0.6); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(180,0,30,0.6); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(120,0,180,0.6); }
  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 2vh; padding:0 24px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(30px) scale(.96);} to{opacity:1;transform:translateY(0) scale(1);} }
  .sad-label {
    font-size:1rem; letter-spacing:3px;
    color:rgba(255,180,180,0.5); font-family:'Bebas Neue',sans-serif;
    border:1px solid rgba(180,0,40,0.3); padding:5px 18px; border-radius:2px;
  }
  .main-text { text-align:center; line-height:1.4; }
  .no-word {
    font-size:clamp(2.5rem,11vw,3.5rem); font-weight:900; color:#fff; display:block;
    text-shadow:0 0 20px rgba(180,0,40,0.9),0 0 50px rgba(120,0,180,0.6);
    animation:shake 3s ease-in-out infinite;
  }
  @keyframes shake {
    0%,100%{transform:rotate(0deg);} 20%{transform:rotate(-2deg);}
    40%{transform:rotate(2deg);} 60%{transform:rotate(-1deg);} 80%{transform:rotate(1deg);}
  }
  .sub-text {
    font-size:clamp(0.95rem,4vw,1.15rem); font-weight:700;
    color:rgba(255,200,200,0.75); display:block; margin-top:6px;
  }
  .imgs { display:flex; gap: 2vh; align-items:center; justify-content:center; }
  .img-wrap {
    border-radius:12px; overflow:hidden;
    border:2px solid rgba(180,0,40,0.4);
    box-shadow:0 0 20px rgba(150,0,200,0.3);
    animation:img-bob ease-in-out infinite;
  }
  .img-wrap:first-child { animation-duration:3.5s; }
  .img-wrap:last-child  { animation-duration:4s; animation-delay:0.5s; }
  @keyframes img-bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .img-wrap img { width:min(38vw,150px); height:min(38vw,150px); object-fit:cover; display:block; }
  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(120,0,180,0.8),rgba(180,0,40,0.8)); border-radius:2px; }
  .out-text {
    font-size:clamp(1rem,4.5vw,1.3rem); font-weight:900;
    color:rgba(255,150,150,0.9); text-align:center;
    text-shadow:0 0 15px rgba(180,0,40,0.6);
    animation:blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* ── GLOBAL FIT FIX ── */
  .card, .container {
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    justify-content: center !important;
  }
  img, canvas {
    max-height: 28vh !important;
    width: auto !important;
    max-width: 80vw !important;
    object-fit: contain !important;
  }
  .photos img, .photo img {
    max-height: 100% !important;
    width: 100% !important;
  }
  .cat-img, .always-img, .cake-img, .ppg-img, .hb-img, .meme-img {
    max-height: 26vh !important;
    width: auto !important;
  }
  #hb-canvas  { max-height: 26vh !important; width: auto !important; }
  #m-canvas   { max-height: 16vh !important; width: auto !important; }
  #meme-canvas{ max-height: 26vh !important; width: auto !important; }
  .gap-fix { gap: 2vh !important; }

</style>
</head>
