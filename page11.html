<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The End</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    height:100vh;
    background:#050a1a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0,60,180,0.45) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 85%, rgba(180,0,30,0.4)  0%,transparent 60%);
    z-index:0;
  }

  .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:2; }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.8;} }

  .corner { position:fixed; width:45px; height:45px; border-style:solid; z-index:5; }
  .corner.tl { top:10px; left:10px;  border-width:2px 0 0 2px; border-color:rgba(0,100,255,0.5); }
  .corner.tr { top:10px; right:10px; border-width:2px 2px 0 0; border-color:rgba(200,0,40,0.5); }
  .corner.bl { bottom:10px; left:10px;  border-width:0 0 2px 2px; border-color:rgba(200,0,40,0.5); }
  .corner.br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-color:rgba(0,100,255,0.5); }

  .stack {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:scale(.95);} to{opacity:1;transform:scale(1);} }

  .img-top {
    width:min(78vw,290px);
    border-radius:14px 14px 0 0;
    object-fit:cover;
    display:block;
    border:2px solid rgba(255,255,255,0.1);
    border-bottom:none;
    animation:float-top 4s ease-in-out infinite;
    filter:drop-shadow(0 -4px 18px rgba(0,100,255,0.3));
  }
  @keyframes float-top {
    0%,100%{transform:translateY(0);}
    50%     {transform:translateY(-6px);}
  }

  .img-bottom {
    width:min(78vw,290px);
    border-radius:0 0 14px 14px;
    object-fit:cover;
    display:block;
    border:2px solid rgba(255,255,255,0.1);
    border-top:none;
    animation:float-bot 4s ease-in-out infinite;
    filter:drop-shadow(0 4px 18px rgba(200,0,40,0.3));
  }
  @keyframes float-bot {
    0%,100%{transform:translateY(0);}
    50%     {transform:translateY(-6px);}
  }

  
  /* ══ FIXED LAYOUT ══ */
  html, body {
    height: 100% !important;
    overflow: hidden !important;
  }
  .card, .container {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: space-between !important;
    height: 100vh !important;
    max-height: 100vh !important;
    overflow: hidden !important;
    padding: 12px 18px 16px !important;
    gap: 0 !important;
    box-sizing: border-box !important;
  }
  /* shrink images to always fit */
  img:not(.bg *), canvas {
    flex-shrink: 1 !important;
    min-height: 0 !important;
    max-height: 30vh !important;
    width: auto !important;
    max-width: 82vw !important;
    object-fit: contain !important;
    display: block !important;
  }
  /* photo grids */
  .photos, .imgs, .media-row, .btn-row {
    flex-shrink: 1 !important;
    min-height: 0 !important;
  }
  .photos img, .photo img, .imgs img {
    max-height: 100% !important;
    width: 100% !important;
    object-fit: cover !important;
  }
  /* text shrink */
  .question, .hehe, .title, .name, .no-word {
    font-size: clamp(1.4rem, 7vw, 2.2rem) !important;
  }
  .subtitle, .sub-text, .msg-text, .bottom-text, .out-text, .important, .confession-text {
    font-size: clamp(0.78rem, 3.5vw, 1rem) !important;
    line-height: 1.5 !important;
  }
  /* nav buttons always at bottom */
  .next-btn, .back-btn, .nav-btn, .boom-btn, .choice-btn {
    flex-shrink: 0 !important;
    padding: 10px 28px !important;
    font-size: 1.3rem !important;
  }
  .btns, .btn-row, .bottom-row {
    flex-shrink: 0 !important;
    margin-top: auto !important;
  }
  .divider { margin: 4px 0 !important; }
  .msg-box, .confession, .bottom-msg { padding: 10px 14px !important; }
  /* ══ END FIXED ══ */
</style>
</head>
