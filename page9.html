<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>أولويز</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    height: 100vh;
    background:#0a0015;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(180,0,100,0.45) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 70% 80%, rgba(100,0,180,0.4)  0%,transparent 60%);
    z-index:0;
  }

  .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:2; }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.8;} }

  .corner { position:fixed; width:45px; height:45px; border-style:solid; z-index:5; }
  .corner.tl { top:10px; left:10px;  border-width:2px 0 0 2px; border-color:rgba(255,80,180,0.5); }
  .corner.tr { top:10px; right:10px; border-width:2px 2px 0 0; border-color:rgba(255,80,180,0.5); }
  .corner.bl { bottom:10px; left:10px;  border-width:0 0 2px 2px; border-color:rgba(180,0,255,0.4); }
  .corner.br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-color:rgba(180,0,255,0.4); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 3vh;
    padding:16px 20px;
    width:100%; height:100vh;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

  .msg-box {
    background:rgba(180,0,100,0.2);
    backdrop-filter:blur(8px);
    border:1.5px solid rgba(255,80,180,0.35);
    border-radius:14px;
    padding:12px 16px;
    width:100%; max-width:360px;
    text-align:center;
  }
  .msg-text {
    font-size:clamp(0.82rem,3.8vw,1rem);
    font-weight:900; color:#fff; line-height:1.7;
    text-shadow:0 0 10px rgba(255,80,180,0.4);
  }
  .highlight { color:#ffaadd; }

  .always-img {
    width:min(62vw,220px);
    border-radius:12px;
    object-fit:cover;
    display:block;
    border:2px solid rgba(255,80,180,0.25);
    filter:drop-shadow(0 0 14px rgba(255,80,180,0.35));
    animation:bob 3.5s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }

  .qarf {
    font-size:clamp(1rem,4.5vw,1.2rem);
    font-weight:900; color:#fff; text-align:center;
    text-shadow:0 0 12px rgba(255,80,180,0.6);
    animation:shake 2s ease-in-out infinite;
  }
  @keyframes shake { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-2deg);} 75%{transform:rotate(2deg);} }

  .cat-img {
    width:min(55vw,200px);
    border-radius:12px; object-fit:cover; display:block;
    filter:drop-shadow(0 0 12px rgba(180,0,255,0.35));
    animation:cat-bob 4s ease-in-out infinite;
  }
  @keyframes cat-bob { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-8px) rotate(2deg);} }

  .divider { width:60px; height:2px; background:linear-gradient(90deg,rgba(255,80,180,0.8),rgba(180,0,255,0.8)); border-radius:2px; }

  .next-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 32px;
    background:linear-gradient(135deg,rgba(180,0,100,0.3),rgba(100,0,180,0.3));
    border:1.5px solid rgba(255,80,180,0.35);
    border-radius:4px; color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.4rem; letter-spacing:5px;
    text-decoration:none; position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .next-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .next-btn:active { transform:scale(0.97); }
  .arrow { animation:arrow-b 1.5s ease-in-out infinite; display:inline-block; }
  @keyframes arrow-b { 0%,100%{transform:translateX(0);} 50%{transform:translateX(5px);} }
</style>
</head>
