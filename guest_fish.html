<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سمكه</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&family=Space+Mono:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#020d18;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(0,40,100,0.8) 0%,transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 80%,  rgba(0,20,60,0.9)  0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 50%,  rgba(0,10,30,0.7)  0%,transparent 70%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
    z-index:1; pointer-events:none;
  }

  /* bubbles */
  .bubble {
    position:fixed;
    border-radius:50%;
    border:1.5px solid rgba(100,200,255,0.3);
    background:rgba(100,200,255,0.04);
    animation:rise-bubble linear infinite;
    z-index:2;
  }
  @keyframes rise-bubble {
    0%   { transform:translateY(110vh) scale(0.8); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.6; }
    100% { transform:translateY(-10vh) scale(1.1); opacity:0; }
  }

  /* waves at bottom */
  .waves {
    position:fixed; bottom:0; left:0; right:0; height:80px; z-index:3;
    overflow:hidden;
  }
  .wave {
    position:absolute; bottom:0; left:-50%; width:200%;
    height:60px; border-radius:50% 50% 0 0;
    background:rgba(0,60,120,0.3);
    animation:wave-move linear infinite;
  }
  .wave:nth-child(2) { height:45px; background:rgba(0,80,160,0.2); animation-duration:7s; animation-delay:-3s; }
  @keyframes wave-move { 0%{transform:translateX(0);} 100%{transform:translateX(25%);} }

  .corner { position:fixed; width:50px; height:50px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(0,150,220,0.5); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(0,150,220,0.5); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(0,100,180,0.4); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(0,100,180,0.4); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap:22px;
    padding:32px 24px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

  /* dead fish SVG */
  .fish-wrap {
    animation:float-fish 4s ease-in-out infinite;
    filter:drop-shadow(0 0 16px rgba(0,150,220,0.4));
  }
  @keyframes float-fish {
    0%,100% { transform:translateY(0) rotate(-5deg); }
    50%      { transform:translateY(-12px) rotate(5deg); }
  }

  /* name */
  .name {
    font-family:'Space Mono',monospace;
    font-size:clamp(2rem,9vw,2.8rem);
    font-weight:700; color:#aaddff; letter-spacing:6px;
    text-shadow:0 0 20px rgba(0,180,255,0.7),0 0 50px rgba(0,100,200,0.4);
    text-decoration:line-through;
    text-decoration-color:rgba(0,180,255,0.5);
  }

  /* RIP */
  .rip {
    font-family:'Bebas Neue',sans-serif;
    font-size:1.1rem; letter-spacing:6px;
    color:rgba(150,210,255,0.5);
    border:1px solid rgba(0,150,220,0.25);
    padding:4px 16px; border-radius:2px;
  }

  /* message box */
  .msg-box {
    background:rgba(0,40,80,0.3);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1.5px solid rgba(0,140,220,0.3);
    border-radius:16px;
    padding:20px 20px;
    width:100%; max-width:360px;
    box-shadow:0 0 24px rgba(0,100,200,0.2);
  }
  .msg-text {
    font-size:clamp(1.1rem,5vw,1.35rem);
    font-weight:900; color:#fff;
    text-align:center; line-height:1.8; direction:rtl;
    text-shadow:0 1px 8px rgba(0,80,160,0.5);
  }
  .blue { color:#7dd4ff; }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(0,150,220,0.8),rgba(0,60,140,0.8)); border-radius:2px; }

  .back-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 28px;
    background:rgba(0,60,120,0.2);
    border:1.5px solid rgba(0,140,220,0.35);
    border-radius:4px; color:rgba(100,200,255,0.8);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.3rem; letter-spacing:4px;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .back-btn:active { transform:scale(0.96); }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="waves">
  <div class="wave" style="animation-duration:8s;"></div>
  <div class="wave"></div>
</div>

<div class="card">

  <!-- dead fish SVG -->
  <div class="fish-wrap">
    <svg width="160" height="100" viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg">
      <!-- tail -->
      <polygon points="20,50 0,25 0,75" fill="#2a6080" opacity="0.8"/>
      <!-- body -->
      <ellipse cx="90" cy="50" rx="65" ry="36" fill="#1a5070" stroke="#3a90c0" stroke-width="2"/>
      <!-- belly -->
      <ellipse cx="85" cy="62" rx="50" ry="18" fill="#164060" opacity="0.6"/>
      <!-- fin top -->
      <path d="M70,20 Q90,5 110,18" stroke="#3a90c0" stroke-width="2" fill="none"/>
      <!-- X eye (dead) -->
      <line x1="112" y1="38" x2="122" y2="48" stroke="#aaddff" stroke-width="3" stroke-linecap="round"/>
      <line x1="122" y1="38" x2="112" y2="48" stroke="#aaddff" stroke-width="3" stroke-linecap="round"/>
      <!-- mouth sad -->
      <path d="M100,60 Q108,68 116,60" stroke="#aaddff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- scales -->
      <path d="M60,40 Q70,32 80,40" stroke="#3a90c0" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M75,35 Q85,27 95,35" stroke="#3a90c0" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M55,52 Q65,44 75,52" stroke="#3a90c0" stroke-width="1.5" fill="none" opacity="0.5"/>
      <!-- bubbles from mouth -->
      <circle cx="130" cy="52" r="3" fill="none" stroke="#aaddff" stroke-width="1.2" opacity="0.5"/>
      <circle cx="138" cy="44" r="4" fill="none" stroke="#aaddff" stroke-width="1.2" opacity="0.35"/>
      <circle cx="145" cy="35" r="5" fill="none" stroke="#aaddff" stroke-width="1.2" opacity="0.2"/>
    </svg>
  </div>

  <div class="name">سمكه 💀</div>
  <div class="rip">R . I . P</div>

  <div class="msg-box">
    <div class="msg-text">
      ماتت لما<br>
      <span class="blue">طلعت من البحر</span> 😔
    </div>
  </div>

  <div class="divider"></div>

  <a class="back-btn" href="page6.html">← BACK</a>
</div>

<script>
// bubbles
for(let i=0;i<20;i++){
  const b=document.createElement('div');
  b.className='bubble';
  const sz=Math.random()*18+8;
  b.style.cssText=[
    'width:'+sz+'px','height:'+sz+'px',
    'left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*6+5)+'s',
    'animation-delay:'+(Math.random()*6)+'s'
  ].join(';');
  document.body.appendChild(b);
}
</script>
</body>
</html>
