<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>شوكولاتة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#1a0800;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif; direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(120,50,0,0.6)  0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 70% 80%, rgba(80,30,0,0.5)   0%,transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(40,10,0,0.7)   0%,transparent 70%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
    z-index:1; pointer-events:none;
  }

  /* floating choc pieces */
  .choc-piece {
    position:fixed; font-size:1.2rem;
    animation:choc-fall linear infinite; z-index:2; opacity:0;
  }
  @keyframes choc-fall {
    0%   { transform:translateY(-60px) rotate(0deg); opacity:0; }
    10%  { opacity:0.8; }
    90%  { opacity:0.4; }
    100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
  }

  .corner { position:fixed; width:50px; height:50px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(200,100,0,0.5); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(200,100,0,0.5); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(160,70,0,0.4); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(160,70,0,0.4); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap:18px;
    padding:28px 20px; width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

  .title {
    font-size:clamp(1.8rem,8vw,2.5rem);
    font-weight:900; color:#fff; text-align:center;
    text-shadow:0 0 20px rgba(220,120,0,0.9),0 0 50px rgba(180,60,0,0.5);
    animation:choc-glow 2.5s ease-in-out infinite;
  }
  @keyframes choc-glow {
    0%,100%{text-shadow:0 0 20px rgba(220,120,0,0.9),0 0 50px rgba(180,60,0,0.5);}
    50%     {text-shadow:0 0 35px rgba(255,160,0,1),  0 0 80px rgba(220,80,0,0.8);}
  }

  /* 2x2 grid */
  .photos {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px; width:100%; max-width:360px;
  }
  .photo {
    aspect-ratio:1; border-radius:12px; overflow:hidden;
    border:2px solid rgba(200,100,0,0.35);
    box-shadow:0 0 16px rgba(180,80,0,0.25);
    animation:bob ease-in-out infinite;
  }
  .photo:nth-child(1){animation-duration:3.5s;}
  .photo:nth-child(2){animation-duration:4s;  animation-delay:0.3s;}
  .photo:nth-child(3){animation-duration:3.8s;animation-delay:0.6s;}
  .photo:nth-child(4){animation-duration:4.2s;animation-delay:0.9s;}
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
  .photo img { width:100%; height:100%; object-fit:cover; display:block; }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(220,120,0,0.8),rgba(180,50,0,0.8)); border-radius:2px; }

  /* bottom text */
  .bottom-msg {
    background:rgba(120,50,0,0.25);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1.5px solid rgba(200,100,0,0.3);
    border-radius:14px;
    padding:16px 20px;
    width:100%; max-width:360px;
    text-align:center;
  }
  .bottom-msg .line1 {
    font-size:clamp(0.95rem,4.2vw,1.15rem);
    font-weight:700; color:rgba(255,200,120,0.9);
    line-height:1.8;
  }
  .bottom-msg .line2 {
    font-size:clamp(1rem,4.5vw,1.2rem);
    font-weight:900; color:#fff;
    text-shadow:0 0 12px rgba(220,120,0,0.7);
    animation:pulse-txt 2s ease-in-out infinite;
  }
  @keyframes pulse-txt {
    0%,100%{opacity:1;} 50%{opacity:0.7;}
  }

  .next-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:13px 36px;
    background:linear-gradient(135deg,rgba(160,60,0,0.35),rgba(100,30,0,0.35));
    border:1.5px solid rgba(220,120,0,0.4);
    border-radius:4px; color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.5rem; letter-spacing:5px;
    text-decoration:none; cursor:pointer;
    position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .next-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .next-btn:active { transform:scale(0.97); }
  .arrow { animation:arrow-b 1.5s ease-in-out infinite; display:inline-block; }
  @keyframes arrow-b { 0%,100%{transform:translateX(0);} 50%{transform:translateX(5px);} }
</style>
</head>
