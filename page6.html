<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>زائرين الحفلة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Bebas+Neue&family=Space+Mono:wght@700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; width:100%; }

  body {
    min-height:100vh;
    background:#050a1a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    font-family:'Tajawal',sans-serif;
    direction:rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0,60,180,0.45) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 85%, rgba(180,0,30,0.4)  0%,transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,20,80,0.6)   0%,transparent 70%);
    z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);
    z-index:1; pointer-events:none;
  }

  .star { position:fixed; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:2; }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1);} 50%{opacity:0.8;transform:scale(1.4);} }

  .corner { position:fixed; width:55px; height:55px; border-style:solid; z-index:5; }
  .corner.tl { top:12px; left:12px;  border-width:3px 0 0 3px; border-color:rgba(0,100,255,0.5); }
  .corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-color:rgba(200,0,40,0.5); }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 3px 3px; border-color:rgba(200,0,40,0.5); }
  .corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-color:rgba(0,100,255,0.5); }

  .card {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap:20px;
    padding:28px 22px;
    width:100%;
    animation:appear 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes appear { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:translateY(0);} }

  .title {
    font-size:clamp(1.5rem,6.5vw,2rem);
    font-weight:900; color:#fff; text-align:center;
    text-shadow:0 0 20px rgba(0,140,255,0.8),0 0 40px rgba(200,0,40,0.4);
  }

  /* grid */
  .grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
    width:100%;
    max-width:380px;
  }

  .guest-card {
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:18px 10px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
    transition:all 0.3s;
    -webkit-tap-highlight-color:transparent;
    position:relative; overflow:hidden;
    text-decoration:none;
  }
  .guest-card::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(0,100,255,0.15),rgba(200,0,40,0.1));
    opacity:0; transition:opacity 0.3s;
  }
  .guest-card:active::before { opacity:1; }
  .guest-card:active { transform:scale(0.96); }

  .guest-emoji { font-size:2rem; }
  .guest-name {
    font-size:clamp(1rem,4.5vw,1.2rem);
    font-weight:900; color:#fff;
    font-family:'Space Mono',monospace;
    text-align:center;
    direction:ltr;
  }
  .guest-sub {
    font-size:0.7rem; color:rgba(255,255,255,0.4);
    letter-spacing:2px; font-family:'Bebas Neue',sans-serif;
  }

  /* glow colors per card */
  .card-miko  { box-shadow:0 0 18px rgba(0,200,255,0.2);  border-color:rgba(0,180,255,0.3); }
  .card-fish  { box-shadow:0 0 18px rgba(255,150,0,0.2);  border-color:rgba(255,150,0,0.3); }
  .card-kitty { box-shadow:0 0 18px rgba(255,100,150,0.2);border-color:rgba(255,100,150,0.3); }
  .card-darwin{ box-shadow:0 0 18px rgba(100,255,100,0.2);border-color:rgba(100,255,100,0.3); }

  .divider { width:70px; height:2px; background:linear-gradient(90deg,rgba(0,100,255,0.8),rgba(200,0,40,0.8)); border-radius:2px; }

  /* bottom row */
  .bottom-row {
    display:flex; align-items:center; gap:14px;
    flex-direction:column; width:100%; max-width:380px;
  }

  .check-row {
    display:flex; align-items:center; gap:12px;
    width:100%;
  }
  .check-question {
    font-size:clamp(0.9rem,4vw,1.05rem);
    font-weight:700; color:rgba(255,255,255,0.8);
    flex:1;
  }
  /* custom checkbox */
  .check-box {
    width:34px; height:34px; min-width:34px;
    border:2px solid rgba(0,140,255,0.6);
    border-radius:8px; background:rgba(0,60,180,0.15);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 0.3s;
    -webkit-tap-highlight-color:transparent;
  }
  .check-box.checked {
    background:rgba(0,140,255,0.35);
    border-color:rgba(0,200,255,0.9);
    box-shadow:0 0 14px rgba(0,160,255,0.6);
  }
  .check-icon { font-size:1.2rem; opacity:0; transition:opacity 0.3s; }
  .check-box.checked .check-icon { opacity:1; }

  /* next btn — hidden until checked */
  .next-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:13px 36px;
    background:linear-gradient(135deg,rgba(0,60,180,0.3),rgba(180,0,30,0.3));
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:4px; color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:1.5rem; letter-spacing:5px;
    text-decoration:none; cursor:pointer;
    position:relative; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.4s;
    opacity:0; pointer-events:none; transform:translateY(10px);
  }
  .next-btn.visible { opacity:1; pointer-events:all; transform:translateY(0); }
  .next-btn::after {
    content:''; position:absolute; top:-50%; left:-75%;
    width:50%; height:200%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.12),transparent);
    animation:shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-75%;} 100%{left:175%;} }
  .next-btn:active { transform:scale(0.97); }
  .arrow { animation:arrow-b 1.5s ease-in-out infinite; display:inline-block; }
  @keyframes arrow-b { 0%,100%{transform:translateX(0);} 50%{transform:translateX(5px);} }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="card">

  <div class="title">زائرين الحفلة</div>

  <div class="grid">
    <a class="guest-card card-miko" href="guest_miko.html">
      
      <div class="guest-name">Miko</div>
      <div class="guest-sub">TAP TO VISIT</div>
    </a>
    <a class="guest-card card-fish" href="guest_fish.html">
      
      <div class="guest-name">سمكه</div>
      <div class="guest-sub">TAP TO VISIT</div>
    </a>
    <a class="guest-card card-kitty" href="guest_kitty.html">
      
      <div class="guest-name">Kitty</div>
      <div class="guest-sub">TAP TO VISIT</div>
    </a>
    <a class="guest-card card-darwin" href="guest_darwin.html">
      
      <div class="guest-name">داروين</div>
      <div class="guest-sub">TAP TO VISIT</div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="bottom-row">
    <div class="check-row">
      <div class="check-question">خلصتي من الزوار؟!</div>
      <div class="check-box" id="chk" onclick="toggle()">
        <span class="check-icon">✓</span>
      </div>
    </div>
    <a class="next-btn" id="next-btn" href="page7.html">NEXT <span class="arrow">→</span></a>
  </div>

</div>

<script>
function toggle() {
  const chk = document.getElementById('chk');
  const btn = document.getElementById('next-btn');
  chk.classList.toggle('checked');
  btn.classList.toggle('visible', chk.classList.contains('checked'));
}
for(let i=0;i<40;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=['width:'+sz+'px','height:'+sz+'px',
    'top:'+(Math.random()*100)+'vh','left:'+(Math.random()*100)+'vw',
    'animation-duration:'+(Math.random()*3+2)+'s',
    'animation-delay:'+(Math.random()*4)+'s'].join(';');
  document.body.appendChild(s);
}
</script>
</body>
</html>
